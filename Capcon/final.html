<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | Innovalabs</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      min-height:100vh;
      background:linear-gradient(135deg,#0f172a,#1e3a8a);
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .container{
      width:100%;
      max-width:560px;
      text-align:center;
      background:rgba(255,255,255,0.08);
      padding:28px 22px;
      border-radius:22px;
      backdrop-filter:blur(12px);
      box-shadow:0 10px 30px rgba(0,0,0,0.25);
    }

    h1{
      margin-bottom:8px;
      font-size:2rem;
    }

    .photo{
      margin:18px 0;
    }

    .photo img{
      width:100%;
      max-width:320px;
      border-radius:16px;
    }

    .message{
      line-height:1.7;
      opacity:0.95;
    }

    .back-home{
      display:inline-block;
      margin-top:18px;
      padding:10px 18px;
      background:#6366f1;
      color:white;
      text-decoration:none;
      border-radius:10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Thank You 💙</h1>
    <p>From Team Innovalabs</p>

    <div class="photo">
      <img src="images/group-photo.jpeg" alt="Innovalabs group photo">
    </div>

    <div class="message">
      Hope you enjoyed exploring our capstone journey.<br>
      Built with teamwork, creativity, and dedication ✨
    </div>

    <a href="index.html" class="back-home">Back to Start</a>
  </div>
</body>
</html>
